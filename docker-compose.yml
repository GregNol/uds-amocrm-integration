services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      # внутренняя сеть проекта (доступ к db)
      default:
      # общий reverse-proxy (Caddy) — уникальный алиас для этой интеграции
      edge:
        aliases:
          - uds-amocrm-app

# HTTPS обслуживает общий Caddy из ../caddy (внешняя сеть edge).
# Создать один раз:  docker network create edge
networks:
  edge:
    external: true

volumes:
  pgdata:
